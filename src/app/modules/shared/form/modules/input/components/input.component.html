<mat-form-field [class.invalidValue]="isShowError()">
	@if (label()) {
		<mat-label>{{ label() }}</mat-label>
	}

	<input
		matInput
		[required]="isRequired()"
		[value]="value()"
        [type]="type()"
		[placeholder]="placeholder()"
		(input)="onInput($event)"
		(blur)="onBlur()"
	/>
</mat-form-field>

<validation-error [error]="errorMessage()" [isShow]="isShowError()" />
