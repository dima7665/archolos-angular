<form>
	@for (statFormGroup of formGroup.controls; track statFormGroup) {
		<div [formGroup]="statFormGroup">
			<app-select controlValidation [options]="statTypeOptions" name="Type" formControlName="stat"></app-select>

			<app-input controlValidation label="Value" type="number" formControlName="value"></app-input>

			<app-input controlValidation label="Duration" type="number" formControlName="duration"></app-input>
		</div>

		<div>
			<button type="button" (click)="addStat()">Add</button>

			@if (formGroup.value.length > 1) {
				<button type="button" (click)="removeStat($index)">Remove</button>
			}
		</div>
	}
</form>
