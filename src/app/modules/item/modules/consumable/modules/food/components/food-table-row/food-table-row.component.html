<td>{{ item().id }}</td>
<td>{{ item().name }}</td>
<td>{{ item().price }}</td>

<td>
	@for (stat of item().consumableStats; track stat.id) {
		<p class="d-flex justify-content-between">
			<span>{{ consumableStatI18n[stat.name] }}:</span> <span>{{ stat.value }}</span>
		</p>
	}
</td>

<td>{{ item().description }}</td>
