<div class="controls">
	<app-select label="Type of item" [options]="options" [(value)]="selectedType"></app-select>
</div>

@switch (selectedType()) {
	@case (ItemType.Food)
	@case (ItemType.Potion) {
		<consumable-form></consumable-form>
	}
	@case (ItemType.Other) {
		<misc-form></misc-form>
	}
	@case (ItemType.Weapon) {
		<weapon-form></weapon-form>
	}
	@case (ItemType.Weapon) {}
}
