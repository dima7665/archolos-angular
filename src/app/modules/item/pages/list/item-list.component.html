<div>
	<div style="display: flex; align-items: center; justify-content: space-between">
		<p>Item list</p>
		<a routerLink="/items/add" [queryParams]="{ type: selectedType() }">Create item</a>
	</div>

	<mat-form-field>
		<mat-label>Type of items</mat-label>
		<mat-select [(value)]="selectedType">
			@for (item of options; track item.key) {
				<mat-option [value]="item.key">{{ item.text }}</mat-option>
			}
		</mat-select>
	</mat-form-field>

	<router-outlet></router-outlet>
</div>
